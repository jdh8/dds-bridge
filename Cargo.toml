[package]
name = "dds-bridge"
version = "0.13.1"
authors = ["Chen-Pang He (https://jdh8.org)"]
edition = "2024"
description = "Rusty API for DDS, the double dummy solver for bridge"
repository = "https://github.com/jdh8/dds-bridge"
license = "Apache-2.0"
categories = ["game-development"]
keywords = ["bridge", "double-dummy"]

[dependencies]
bitflags = "2.11.0"
dds-bridge-sys = "2.0.4"
rand = "0.10.0"
regex = "1.12.3"
thiserror = "2.0.18"

[profile.dev]
opt-level = 2
